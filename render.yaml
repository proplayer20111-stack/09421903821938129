services:
  - type: web
    name: callroom
    runtime: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    healthCheckPath: "/healthz"
    autoDeploy: true
    envVars:
      - key: SITE_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        sync: false
      - key: AZURE_SPEECH_VOICE
        value: en-US-AriaNeural
