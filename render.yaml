services:
  - type: web
    name: callroom
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: "/healthz"
    autoDeploy: true
    envVars:
      - key: SITE_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PIPER_IDLE_MS
        value: "90000"
