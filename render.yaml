services:
  - type: web
    name: callroom
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: "/healthz"
    autoDeploy: true
    envVars:
      - key: SITE_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TTS_VOICE
        value: "en-US-EmmaMultilingualNeural"
