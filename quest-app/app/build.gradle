plugins {
    id "com.android.application"
}

android {
    namespace "com.healthpacksquad.quest"
    compileSdk 35

    defaultConfig {
        applicationId "com.healthpacksquad.quest"
        minSdk 29
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
