name: Build Quest APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "quest-app/**"
      - ".github/workflows/build-quest-apk.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.13"

      - name: Install Android SDK platform
        run: '"$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"'

      - name: Build installable APK
        working-directory: quest-app
        run: gradle --no-daemon assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: healthpack-quest-apk
          path: quest-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
